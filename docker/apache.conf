# Configuración del host virtual para el puerto 80 (HTTP)
<VirtualHost *:80>
    # Define el directorio raíz donde se encuentran los archivos de la aplicación
    # Apunta a la carpeta 'public' que suele ser el punto de entrada en frameworks como Laravel
    DocumentRoot /var/www/html/public
    
    # Configuración de permisos para el directorio raíz
    <Directory /var/www/html/public>
        # Permite sobrescribir la configuración usando archivos .htaccess
        # Esto es útil para reescribir URLs, establecer reglas de acceso, etc.
        AllowOverride All
        
        # Permite el acceso a este directorio desde cualquier origen
        # Es la configuración estándar para entornos web
        Require all granted
    </Directory>

    # Archivos de log específicos para este host virtual
    # ErrorLog: registra errores del servidor
    ErrorLog ${APACHE_LOG_DIR}/error.log
    # CustomLog: registra todas las peticiones entrantes en formato combinado
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>

# Configuración del host virtual para el puerto 443 (HTTPS)
<VirtualHost *:443>
    # Mismo directorio raíz que la versión HTTP
    DocumentRoot /var/www/html/public
    
    # Configuración específica para SSL/HTTPS
    # Activa el motor SSL para este host virtual
    SSLEngine on
    # Ruta al archivo del certificado SSL (público)
    # Este archivo identifica al servidor de manera segura
    SSLCertificateFile /etc/apache2/ssl/certificate.crt
    # Ruta a la clave privada del certificado (confidencial)
    # Se usa para desencriptar las comunicaciones
    SSLCertificateKeyFile /etc/apache2/ssl/private.key

    # Misma configuración de directorio que en HTTP
    <Directory /var/www/html/public>
        AllowOverride All
        Require all granted
    </Directory>

    # Misma configuración de logs que en HTTP
    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>